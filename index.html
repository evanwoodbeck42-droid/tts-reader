<!DOCTYPE html>
<html>
<head>
  <title>TikTok Comment TTS</title>

  <style>
    body{
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #111;
      color: white;
    }

    h1{
      text-align:center;
    }

    textarea{
      width:100%;
      height:120px;
      padding:10px;
      border:none;
      border-radius:10px;
      font-size:16px;
      margin-top:20px;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff0050;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    audio{
      width:100%;
      margin-top:20px;
    }
  </style>
</head>

<body>

<h1>TikTok Comment TTS</h1>

<textarea id="text" placeholder="Type a TikTok comment..."></textarea>

<button onclick="generateTTS()">
Generate Voice
</button>

<audio id="audio" controls></audio>

<script>
async function generateTTS() {

  const text =
    document.getElementById("text").value;

  const response = await fetch(
    "https://freetts.org/api/tts",
    {
      method: "POST",
      headers: {
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        text:text,
        voice:"en-US-JennyNeural"
      })
    }
  );

  const data = await response.json();

  document.getElementById("audio").src =
    "https://freetts.org/api/audio/" +
    data.file_id;
}
</script>

</body>
</html>
